<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국어 단어 마스터 1000 - AI & Review Edition</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

  <header class="w-full max-w-2xl mb-8 text-center">
    <h1 class="text-4xl font-bold font-serif text-[#3B392E] mb-3 tracking-tight">AI 단어장 마스터</h1>
    <p class="text-[#84806A] text-sm font-medium">직접 적고 AI에게 첨삭받으며 완벽하게 내 것으로 만드세요</p>
    
    <!-- Level Selector -->
    <div id="level-tabs" class="flex justify-center flex-wrap gap-2 mt-6">
      
      <!-- Review mode tab generated manually, others by JS -->
      <button id="btn-tab-review" class="px-6 py-2 rounded-full font-bold text-sm transition-all border shadow-sm bg-white/60 text-[#D98C63] border-[#D6D2BF] hover:bg-white" onclick="selectLevel('REVIEW')">
        📚 내 복습장
      </button>

      <!-- Tabs will be dynamically inserted here by app.js -->
    </div>
  </header>

  <main class="w-full max-w-2xl space-y-8">
    
    <section class="glass-panel rounded-3xl p-6 relative overflow-hidden hidden" id="stats-section">
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#8ba175] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-[#D98C63] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
      
      <div class="flex justify-between items-end mb-4 relative z-10">
        <div>
          <h2 id="stats-title" class="text-lg font-bold text-[#3B392E]">현재 등급 학습 현황</h2>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 text-center relative z-10">
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">미학습/틀림</p>
          <p id="stat-pending" class="text-2xl font-bold text-[#5c594c]">0</p>
        </div>
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">학습 중</p>
          <p id="stat-learning" class="text-2xl font-bold text-[#6A7B54]">0</p>
        </div>
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">완벽 암기</p>
          <p id="stat-mastered" class="text-2xl font-bold text-[#C47D57]">0</p>
        </div>
      </div>
    </section>

    <!-- Review List View Area -->
    <section id="review-list-section" class="hidden flex-col items-center">
      <div class="w-full bg-white/60 backdrop-blur-md rounded-3xl border border-[#D6D2BF] p-6 shadow-sm">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold text-[#3B392E]">내가 공부한 단어 목록</h3>
          <button id="btn-start-review-cards" class="px-5 py-2 bg-[#D98C63] text-white rounded-xl font-bold text-sm shadow-md hover:bg-[#c37a53] transition-all flex items-center gap-2" onclick="startReviewCards()">
            🔥 플래시카드 풀기 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          </button>
        </div>
        
        <div class="max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
          <ul id="review-word-list" class="space-y-3">
            <!-- List items populated by app.js -->
          </ul>
        </div>
      </div>
    </section>

    <!-- Flashcard Area -->
    <section id="card-area" class="flex flex-col items-center hidden">
      
      <div id="word-card-container" class="perspective-1000 w-full group">
        <div id="word-card-inner" class="card-inner transform-style-3d relative w-full min-h-[420px] grid shadow-xl rounded-3xl transition-shadow duration-300">
          
          <!-- Front Side -->
          <div class="col-start-1 row-start-1 backface-hidden h-full bg-[#FAF8F0] rounded-3xl flex flex-col justify-start items-center p-8 border border-[#E0DBC5]">
            <h3 id="word-front" class="text-4xl font-bold font-serif text-[#3B392E] mt-2 mb-2">단어</h3>
            <p id="word-front-pos" class="text-xs font-bold text-[#C47D57] bg-[#F5EFEA] px-2 py-1 rounded-md mb-2"></p>
            <p id="word-front-hanja" class="text-sm text-[#8A887A] font-medium tracking-widest mb-4"></p>
            
            <div id="loading-indicator-front" class="flex w-full flex-col items-center justify-center mt-3 mb-3 text-[#8A887A]">
              <div class="w-6 h-6 border-4 border-[#8ba175] border-t-transparent rounded-full animate-spin mb-2"></div>
              <p class="text-xs font-medium animate-pulse">AI가 실생활 예문을 만들고 있어요...</p>
            </div>

            <div id="front-examples-area" class="w-full hidden flex-col items-center mb-6">
              <p class="text-[0.65rem] text-[#84806A] font-bold mb-2 uppercase tracking-widest">💡 예문을 보고 뜻을 유추해보세요</p>
              <ul id="word-front-examples" class="text-sm text-left w-full text-stone-700 bg-[#EAE6D6]/50 border border-[#D6D2BF] p-4 rounded-xl space-y-2 break-keep leading-relaxed list-disc list-inside">
              </ul>
            </div>

            <!-- Restore Text Area for AI Grading -->
            <textarea id="user-meaning-input" class="w-full bg-[#F5F2E6] border border-[#D6D2BF] rounded-xl p-4 text-stone-800 text-sm focus:outline-none focus:ring-2 focus:ring-[#8ba175] focus:bg-[#FAF8F0] transition-colors resize-none h-20" placeholder="이 단어의 정확한 뜻/뉘앙스는 무엇일까요? 서술해보세요."></textarea>
            
            <div id="loading-indicator-grade" class="hidden w-full flex-col items-center justify-center mt-4 text-[#8A887A]">
              <div class="w-6 h-6 border-4 border-[#D98C63] border-t-transparent rounded-full animate-spin mb-2"></div>
              <p class="text-xs font-medium animate-pulse">선생님이 답안을 채점하고 있어요...</p>
            </div>
          </div>

          <!-- Back Side -->
          <div class="col-start-1 row-start-1 rotate-y-180 backface-hidden h-full glass-panel rounded-3xl flex flex-col p-8 border-t border-l border-white/80 bg-gradient-to-br from-[#EAE6D6]/30 to-[#FAF8F0]">
            <div class="flex flex-col h-full space-y-4">
              
              <!-- AI Judgment Feedback -->
              <div id="ai-judgment-area" class="px-4 py-3 rounded-xl mb-2 bg-white/80 shadow-sm border border-[#E0DBC5]">
                <div class="flex items-center gap-2 mb-1">
                  <span id="ai-judgment-badge" class="px-2 py-1 text-xs font-bold rounded-lg text-white bg-gray-400">판정</span>
                  <p class="font-bold text-sm text-[#3B392E]">AI 선생님의 채점 피드백</p>
                </div>
                <p id="ai-feedback" class="text-sm text-stone-700 mt-1 break-keep leading-relaxed">피드백이 표시됩니다.</p>
              </div>

              <div class="bg-white/70 rounded-xl p-4 border border-[#E0DBC5]/50 shadow-sm">
                <p class="text-xs text-[#8A887A] font-bold mb-1 uppercase tracking-widest">실제 정확한 뜻</p>
                <p id="word-back-meaning-basic" class="text-base font-bold text-stone-800 break-keep leading-snug"></p>
              </div>

              <div class="bg-white/70 rounded-xl p-4 border border-[#E0DBC5]/50 shadow-sm">
                <p class="text-xs text-[#8A887A] font-bold mb-1 uppercase tracking-widest">상세 해설 & 뉘앙스</p>
                <p id="word-back-meaning-detailed" class="text-sm font-medium text-stone-700 leading-relaxed break-keep"></p>
              </div>
              
              <div id="hanja-breakdown-area" class="bg-[#8BA175]/10 rounded-xl p-4 border border-[#8BA175]/20">
                <p class="text-xs text-[#6A7B54] font-bold mb-1 uppercase tracking-widest">한자 분해 및 어원</p>
                <p id="word-back-hanja-breakdown" class="text-xs font-medium text-[#414A35] leading-relaxed break-keep"></p>
              </div>
            </div>
          </div>
          
        </div>
      </div>

      <div class="mt-8 w-full max-w-sm">
        
        <!-- Action Button (Front) -->
        <button id="btn-submit" class="w-full py-4 rounded-2xl bg-[#5C664C] text-[#F5F2E6] font-medium shadow-lg shadow-[#5C664C]/20 hover:bg-[#4a523d] transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
          답안 제출 및 자동 채점
        </button>

        <!-- Next Button (Back) -->
        <div id="btn-container-next" class="hidden w-full">
          <button id="btn-next" class="w-full py-4 bg-[#D98C63] text-[#F5F2E6] rounded-2xl font-bold shadow-lg shadow-[#D98C63]/20 hover:bg-[#c37a53] transition-transform active:scale-95 flex items-center justify-center gap-2">
            다시 묻기/다음 단어 
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>

      </div>

    </section>

    <section id="empty-state" class="glass-panel rounded-3xl p-12 text-center flex flex-col items-center">
      <div class="w-20 h-20 bg-[#E8EDE1] text-[#6A7B54] rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h3 id="empty-title" class="text-3xl font-bold font-serif text-[#3B392E] mb-3">학습할 단계를 선택해주세요</h3>
      <p id="empty-subtitle" class="text-[#84806A]">위에서 탭을 선택하면 단어 학습이 시작됩니다.</p>
    </section>

  </main>

  </main>

  <script src="words_db.js"></script>
  <script src="app.js"></script>
</body>
</html>
