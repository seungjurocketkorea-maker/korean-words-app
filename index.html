<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국어 단어 마스터 1000 - Anki Style</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

  <header class="w-full max-w-2xl mb-8 text-center">
    <h1 class="text-4xl font-bold font-serif text-[#3B392E] mb-3 tracking-tight">AI 단어장 마스터</h1>
    <p class="text-[#84806A] text-sm font-medium">스마트 복습 알고리즘으로 확실하게 내 것으로 만드세요</p>
    
    <!-- Level Selector -->
    <div id="level-tabs" class="flex justify-center flex-wrap gap-2 mt-6">
      <!-- Tabs will be dynamically inserted here by app.js -->
    </div>
  </header>

  <main class="w-full max-w-2xl space-y-8">
    
    <section class="glass-panel rounded-3xl p-6 relative overflow-hidden hidden" id="stats-section">
      <!-- Glow effect (Olive & Orange tones) -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#8ba175] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-[#D98C63] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
      
      <div class="flex justify-between items-end mb-4 relative z-10">
        <div>
          <h2 class="text-lg font-bold text-[#3B392E]">현재 등급 학습 현황</h2>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 text-center relative z-10">
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">미학습/틀림</p>
          <p id="stat-pending" class="text-2xl font-bold text-[#5c594c]">0</p>
        </div>
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">애매함</p>
          <p id="stat-learning" class="text-2xl font-bold text-[#6A7B54]">0</p>
        </div>
        <div class="bg-white/50 backdrop-blur-sm rounded-2xl py-3 border border-[#E0DBC5]">
          <p class="text-xs text-[#84806A] font-semibold mb-1 uppercase tracking-wider">완벽 암기</p>
          <p id="stat-mastered" class="text-2xl font-bold text-[#C47D57]">0</p>
        </div>
      </div>
    </section>

    <section id="card-area" class="flex flex-col items-center hidden">
      
      <div id="word-card-container" class="perspective-1000 w-full group">
        <div id="word-card-inner" class="card-inner transform-style-3d relative w-full min-h-[420px] grid shadow-xl rounded-3xl transition-shadow duration-300">
          
          <!-- Front Side -->
          <div class="col-start-1 row-start-1 backface-hidden h-full bg-[#FAF8F0] rounded-3xl flex flex-col justify-start items-center p-8 border border-[#E0DBC5]">
            <h3 id="word-front" class="text-4xl font-bold font-serif text-[#3B392E] mt-4 mb-2">단어</h3>
            <p id="word-front-pos" class="text-sm font-bold text-[#C47D57] bg-[#F5EFEA] px-2 py-1 rounded-md mb-2"></p>
            <p id="word-front-hanja" class="text-lg text-[#8A887A] font-medium tracking-widest mb-6"></p>
            
            <div id="loading-indicator" class="flex w-full flex-col items-center justify-center mt-6 text-[#8A887A]">
              <div class="w-8 h-8 border-4 border-[#8ba175] border-t-transparent rounded-full animate-spin mb-3"></div>
              <p class="text-sm font-medium animate-pulse">AI가 실생활 예문을 만들고 있어요...</p>
            </div>

            <div id="front-examples-area" class="w-full hidden flex-col items-center">
              <p class="text-xs text-[#84806A] font-bold mb-3 uppercase tracking-widest">💡 예문을 보고 뜻을 유추해보세요</p>
              <ul id="word-front-examples" class="text-[0.95rem] text-left w-full text-stone-700 bg-[#EAE6D6]/50 border border-[#D6D2BF] p-5 rounded-xl mb-4 space-y-3 break-keep leading-relaxed list-disc list-inside">
              </ul>
            </div>
          </div>

          <!-- Back Side -->
          <div class="col-start-1 row-start-1 rotate-y-180 backface-hidden h-full glass-panel rounded-3xl flex flex-col p-8 border-t border-l border-white/80 bg-gradient-to-br from-[#EAE6D6]/30 to-[#FAF8F0]">
            <div class="flex flex-col h-full space-y-4">
              <div class="bg-white/70 rounded-xl p-5 border border-[#E0DBC5]/50 shadow-sm">
                <p class="text-xs text-[#8A887A] font-bold mb-2 uppercase tracking-widest">실제 뜻 (사전)</p>
                <p id="word-back-meaning-basic" class="text-lg font-bold text-stone-800 break-keep leading-snug"></p>
              </div>

              <div class="bg-white/70 rounded-xl p-5 border border-[#E0DBC5]/50 shadow-sm">
                <p class="text-xs text-[#8A887A] font-bold mb-2 uppercase tracking-widest">AI 상세 해설 & 뉘앙스</p>
                <p id="word-back-meaning-detailed" class="text-base font-medium text-stone-700 leading-relaxed break-keep"></p>
              </div>
              
              <div id="hanja-breakdown-area" class="bg-[#8BA175]/10 rounded-xl p-5 border border-[#8BA175]/20">
                <p class="text-xs text-[#6A7B54] font-bold mb-2 uppercase tracking-widest">한자 분해 및 어원</p>
                <p id="word-back-hanja-breakdown" class="text-sm font-medium text-[#414A35] leading-relaxed break-keep"></p>
              </div>
            </div>
          </div>
          
        </div>
      </div>

      <div class="mt-8 w-full max-w-sm">
        
        <button id="btn-reveal" class="w-full py-4 rounded-2xl bg-[#5C664C] text-[#F5F2E6] font-medium shadow-lg shadow-[#5C664C]/20 hover:bg-[#4a523d] transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed hidden">
          단어 뜻 확인하기 (뒤집기)
        </button>

        <!-- Anki Style 3 Buttons -->
        <div id="btn-container-actions" class="hidden flex gap-2 w-full">
          <button id="btn-mark-wrong" class="flex-1 py-4 bg-[#F5E6E6] text-[#A64B4B] rounded-xl border border-[#E8C5C5] font-bold transition-transform active:scale-95 hover:bg-[#EDD4D4] flex flex-col items-center justify-center">
            <span>틀렸음</span>
            <span class="text-[0.65rem] font-normal mt-1 opacity-80">(자주 반복)</span>
          </button>
          
          <button id="btn-mark-partial" class="flex-1 py-4 bg-[#F0EFDF] text-[#7A7555] rounded-xl border border-[#DEDCBE] font-bold transition-transform active:scale-95 hover:bg-[#E8E6CC] flex flex-col items-center justify-center">
            <span>애매함</span>
            <span class="text-[0.65rem] font-normal mt-1 opacity-80">(종종 반복)</span>
          </button>
          
          <button id="btn-mark-correct" class="flex-1 py-4 bg-[#E2EAD8] text-[#4F633B] rounded-xl border border-[#C5D6B6] font-bold transition-transform active:scale-95 hover:bg-[#D5E0C7] flex flex-col items-center justify-center shadow-md">
            <span>맞혔음</span>
            <span class="text-[0.65rem] font-normal mt-1 opacity-80">(드물게 반복)</span>
          </button>
        </div>

      </div>

    </section>

    <section id="empty-state" class="glass-panel rounded-3xl p-12 text-center flex flex-col items-center">
      <div class="w-20 h-20 bg-[#E8EDE1] text-[#6A7B54] rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h3 class="text-3xl font-bold font-serif text-[#3B392E] mb-3">학습할 등급을 선택해주세요</h3>
      <p class="text-[#84806A]">위에서 A, B, C 등급 탭을 선택하면 단어 학습이 시작됩니다.</p>
    </section>

  </main>

  <script src="words_db.js"></script>
  <script src="app.js"></script>
</body>
</html>
